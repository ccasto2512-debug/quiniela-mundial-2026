<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxzlTFRjQXict4_2vlXLnJ4UAfRYWEv5qy4z6Br55dARotLuX7EV-0XKdAzEadKOesB/exec";

let players=[], matches=[], predictions=[], results=[], specials=[], realSpecials={};

function goSheet(id,btn){
 document.querySelectorAll(".sheet").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
 document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
 if(btn) btn.classList.add("active");
}

function normalize(v){return String(v||"").trim().toLowerCase();}
function cleanKey(v){return String(v||"").trim();}
function makeMatchId(date,home,away,index){
 return `${date}-${index}-${normalize(home).replace(/\s+/g,"-")}-vs-${normalize(away).replace(/\s+/g,"-")}`;
}
function winner(h,a,home,away){
 h=Number(h);a=Number(a);
 if(isNaN(h)||isNaN(a))return "";
 if(h>a)return home;if(a>h)return away;return "Empate";
}
function scorerList(v){return String(v||"").split(",").map(x=>normalize(x)).filter(Boolean);}

function rowsToObjects(rows){
 if(!rows || rows.length===0)return[];
 const headers=rows[0].map(h=>cleanKey(h));

 return rows.slice(1).filter(r=>r.some(c=>c!=="")).map((r,idx)=>{
  const o={};
  headers.forEach((h,i)=>o[h]=r[i]??"");

  o.nombre = o.nombre || o.Nombre || o.Jugador || o.jugador || o.Participante || r[1] || r[0] || "";

  o.fecha = o.fecha || o.Fecha || o.FechaPartido || o["Fecha Partido"] || "";
  o.fase = o.fase || o.Fase || o.Grupo || o.Group || "";
  o.hora = o.hora || o.Hora || o.HoraCR || "";
  o.estadio = o.estadio || o.Estadio || "";
  o.local = o.local || o.Local || o.Equipo1 || o["Equipo 1"] || o.Casa || "";
  o.visitante = o.visitante || o.Visitante || o.Equipo2 || o["Equipo 2"] || o.Fuera || "";

  o.jugador = o.jugador || o.Jugador || o.Nombre || "";
  o.matchId = o.matchId || o.MatchID || o.PartidoID || o.id || "";
  o.id = o.id || o.ID || o.MatchID || o.PartidoID || "";

  o.localGoles = o.localGoles || o.LocalGoles || o.GolesLocal || o.PredLocal || o.ResultadoLocal || "";
  o.visitanteGoles = o.visitanteGoles || o.VisitanteGoles || o.GolesVisitante || o.PredVisitante || o.ResultadoVisitante || "";
  o.goleadores = o.goleadores || o.Goleadores || o.QuienMeteGol || o["Quien mete gol"] || "";

  return o;
 });
}

function objectsToRows(headers,arr){
 return [headers,...arr.map(o=>headers.map(h=>o[h]??""))];
}

function fixMatchIds(){
 const dateCount={};
 matches.forEach(m=>{
  if(!m.fecha && m.FechaPartido)m.fecha=m.FechaPartido;
  if(!m.local && m.Equipo1)m.local=m.Equipo1;
  if(!m.visitante && m.Equipo2)m.visitante=m.Equipo2;

  dateCount[m.fecha]=(dateCount[m.fecha]||0)+1;

  if(!m.id || String(m.id).trim()===""){
   m.id=makeMatchId(m.fecha,m.local,m.visitante,dateCount[m.fecha]);
  }
 });
}

function loadCloud(){
 cloudStatus.textContent="Cargando nube...";
 const cb="cb_"+Date.now();

 window[cb]=res=>{
  if(res.ok){
   const data=res.data || {};

   players = rowsToObjects(data.DB || data.Jugadores || data.Players || []);
   matches = rowsToObjects(data.Sheet1 || data.Partidos || []);
   predictions = rowsToObjects(data.Resultados || data.Predicciones || []);
   results = rowsToObjects(data.ResultadosReales || []);
   specials = rowsToObjects(data.Especiales || []);
   realSpecials = rowsToObjects(data.EspecialesReales || [])[0] || {};

   fixMatchIds();
   renderAll();

   cloudStatus.textContent="Conectado · "+new Date().toLocaleTimeString();
  }else{
   cloudStatus.textContent="Error al cargar";
  }

  delete window[cb];
  script.remove();
 };

 const script=document.createElement("script");
 script.src=API_URL+"?callback="+cb+"&t="+Date.now();
 document.body.appendChild(script);
}

async function saveSheet(sheet,rows){
 cloudStatus.textContent="Guardando "+sheet+"...";
 const body=new URLSearchParams({sheet,rows:JSON.stringify(rows)});
 await fetch(API_URL,{method:"POST",mode:"no-cors",body});
 cloudStatus.textContent="Guardado "+sheet+" · "+new Date().toLocaleTimeString();
}

function fillSelect(sel,arr,valueKey="nombre"){
 const cur=sel.value;
 sel.innerHTML=arr.map(x=>`<option value="${x[valueKey]}">${x[valueKey]}</option>`).join("");
 if(cur)sel.value=cur;
}

function fillDays(){
 const days=[...new Set(matches.map(m=>m.fecha).filter(Boolean))].sort();
 [entryDay,realDay].forEach(sel=>{
  const cur=sel.value;
  sel.innerHTML=days.map(d=>`<option value="${d}">${d}</option>`).join("");
  if(cur)sel.value=cur;
 });
}

function renderAll(){
 fillSelect(entryPlayer,players);
 fillSelect(detailPlayer,players);
 fillSelect(specialPlayer,players);
 fillDays();
 renderEntries();
 renderRealEntries();
 renderSpecials();
 renderStandings();
 renderDetails();
 renderAdmin();
 renderShareMessage();
 kpiMatches.textContent=matches.length;
 kpiPlayers.textContent=players.length;
 kpiSync.textContent=new Date().toLocaleTimeString();
}

function getPred(player,id){
 return predictions.find(p=>normalize(p.jugador)===normalize(player)&&String(p.matchId)===String(id))||{};
}
function getRes(id){
 return results.find(r=>String(r.matchId)===String(id))||{};
}

function renderEntries(){
 const player=entryPlayer.value, day=entryDay.value;
 const list=matches.filter(m=>m.fecha===day);

 entryMatches.innerHTML=list.map((m,i)=>{
  const p=getPred(player,m.id);
  return `<div class="match-card">
   <span class="badge">Partido ${i+1}</span> <b>${m.local} vs ${m.visitante}</b><br>
   <span class="muted">${m.fase||""} · ${m.hora||""} · ${m.estadio||""}</span>
   <div class="grid">
    <div class="half"><label>${m.local}</label><input type="number" id="ph_${m.id}" value="${p.localGoles||""}"></div>
    <div class="half"><label>${m.visitante}</label><input type="number" id="pa_${m.id}" value="${p.visitanteGoles||""}"></div>
    <div class="full"><label>Goleadores, separados por coma</label><textarea id="ps_${m.id}">${p.goleadores||""}</textarea></div>
   </div>
  </div>`;
 }).join("")||"<p>No hay partidos para esta fecha.</p>";
}

function saveEntries(){
 const player=entryPlayer.value, day=entryDay.value;
 const ids=matches.filter(m=>m.fecha===day).map(m=>m.id);

 predictions=predictions.filter(p=>!(normalize(p.jugador)===normalize(player)&&ids.includes(p.matchId)));

 matches.filter(m=>m.fecha===day).forEach(m=>{
  predictions.push({
   jugador:player,
   matchId:m.id,
   localGoles:document.getElementById("ph_"+m.id).value,
   visitanteGoles:document.getElementById("pa_"+m.id).value,
   goleadores:document.getElementById("ps_"+m.id).value
  });
 });

 saveSheet("Resultados",objectsToRows(["jugador","matchId","localGoles","visitanteGoles","goleadores"],predictions));
 renderStandings();
 alert("Predicciones guardadas");
}

function renderRealEntries(){
 const day=realDay.value;
 const list=matches.filter(m=>m.fecha===day);

 realMatches.innerHTML=list.map((m,i)=>{
  const r=getRes(m.id);
  return `<div class="match-card">
   <span class="badge">Partido ${i+1}</span> <b>${m.local} vs ${m.visitante}</b>
   <div class="grid">
    <div class="half"><label>${m.local}</label><input type="number" id="rh_${m.id}" value="${r.localGoles||""}"></div>
    <div class="half"><label>${m.visitante}</label><input type="number" id="ra_${m.id}" value="${r.visitanteGoles||""}"></div>
    <div class="full"><label>Goleadores reales</label><textarea id="rs_${m.id}">${r.goleadores||""}</textarea></div>
   </div>
  </div>`;
 }).join("")||"<p>No hay partidos para esta fecha.</p>";
}

function saveRealEntries(){
 const day=realDay.value;
 const ids=matches.filter(m=>m.fecha===day).map(m=>m.id);

 results=results.filter(r=>!ids.includes(r.matchId));

 matches.filter(m=>m.fecha===day).forEach(m=>{
  results.push({
   matchId:m.id,
   localGoles:document.getElementById("rh_"+m.id).value,
   visitanteGoles:document.getElementById("ra_"+m.id).value,
   goleadores:document.getElementById("rs_"+m.id).value
  });
 });

 saveSheet("ResultadosReales",objectsToRows(["matchId","localGoles","visitanteGoles","goleadores"],results));
 renderStandings();
 alert("Resultados guardados");
}

function renderSpecials(){
 const player=specialPlayer.value;
 const s=specials.find(x=>normalize(x.jugador)===normalize(player))||{};
 spChampion.value=s.campeon||"";
 spRunner.value=s.subcampeon||"";
 spThird.value=s.tercero||"";
 spSurprise.value=s.revelacion||"";
 spTopScorer.value=s.goleador||"";
 realChampion.value=realSpecials.campeon||"";
 realRunner.value=realSpecials.subcampeon||"";
 realThird.value=realSpecials.tercero||"";
 realSurprise.value=realSpecials.revelacion||"";
 realTopScorer.value=realSpecials.goleador||"";
}

function saveSpecials(){
 const player=specialPlayer.value;
 specials=specials.filter(s=>normalize(s.jugador)!==normalize(player));
 specials.push({
  jugador:player,
  campeon:spChampion.value,
  subcampeon:spRunner.value,
  tercero:spThird.value,
  revelacion:spSurprise.value,
  goleador:spTopScorer.value
 });
 saveSheet("Especiales",objectsToRows(["jugador","campeon","subcampeon","tercero","revelacion","goleador"],specials));
 renderStandings();
}

function saveRealSpecials(){
 realSpecials={
  campeon:realChampion.value,
  subcampeon:realRunner.value,
  tercero:realThird.value,
  revelacion:realSurprise.value,
  goleador:realTopScorer.value
 };
 saveSheet("EspecialesReales",objectsToRows(["campeon","subcampeon","tercero","revelacion","goleador"],[realSpecials]));
 renderStandings();
}

function scorePlayer(name){
 let exact=0,win=0,scorers=0,specialPts=0;

 matches.forEach(m=>{
  const p=getPred(name,m.id), r=getRes(m.id);
  if(r.localGoles!==""&&r.visitanteGoles!==""){
   if(String(p.localGoles)===String(r.localGoles)&&String(p.visitanteGoles)===String(r.visitanteGoles)) exact+=3;
   else if(winner(p.localGoles,p.visitanteGoles,m.local,m.visitante)===winner(r.localGoles,r.visitanteGoles,m.local,m.visitante)) win+=2;

   const real=scorerList(r.goleadores);
   scorerList(p.goleadores).forEach(g=>{if(real.includes(g))scorers+=1;});
  }
 });

 const s=specials.find(x=>normalize(x.jugador)===normalize(name))||{};
 if(normalize(s.campeon)&&normalize(s.campeon)===normalize(realSpecials.campeon))specialPts+=20;
 if(normalize(s.subcampeon)&&normalize(s.subcampeon)===normalize(realSpecials.subcampeon))specialPts+=15;
 if(normalize(s.goleador)&&normalize(s.goleador)===normalize(realSpecials.goleador))specialPts+=15;
 if(normalize(s.tercero)&&normalize(s.tercero)===normalize(realSpecials.tercero))specialPts+=10;
 if(normalize(s.revelacion)&&normalize(s.revelacion)===normalize(realSpecials.revelacion))specialPts+=10;

 return {jugador:name,exact,win,scorers,specialPts,total:exact+win+scorers+specialPts};
}

function renderStandings(){
 const rows=players.map(p=>scorePlayer(p.nombre)).sort((a,b)=>b.total-a.total);
 kpiLeader.textContent=rows[0]?.jugador||"Sin datos";

 standings.innerHTML=`<table><tr><th>#</th><th>Jugador</th><th>Exactos</th><th>Ganador</th><th>Goleadores</th><th>Especiales</th><th>Total</th></tr>
 ${rows.map((r,i)=>`<tr class="${i===0?'leader':''}"><td>${i+1}</td><td>${i===0?'🏆 ':''}${r.jugador}</td><td>${r.exact}</td><td>${r.win}</td><td>${r.scorers}</td><td>${r.specialPts}</td><td><b>${r.total}</b></td></tr>`).join("")}</table>`;
}

function renderDetails(){
 const name=detailPlayer.value;
 if(!name){playerDetails.innerHTML="";return;}

 playerDetails.innerHTML=matches.map(m=>{
  const p=getPred(name,m.id), r=getRes(m.id);
  return `<div class="detail-card"><b>${m.local} vs ${m.visitante}</b><br>
  Predicción: ${p.localGoles??"-"} - ${p.visitanteGoles??"-"} · Real: ${r.localGoles??"-"} - ${r.visitanteGoles??"-"}<br>
  <span class="muted">Goleadores predichos: ${p.goleadores||"-"} · Reales: ${r.goleadores||"-"}</span></div>`;
 }).join("");
}

function renderShareMessage(){
 const day=entryDay.value;
 const list=matches.filter(m=>m.fecha===day);
 sharePreview.textContent=`🏆 Quiniela Mundial 2026\n📅 Fecha: ${day}\n\n`+
 list.map((m,i)=>`${i+1}. ${m.local} vs ${m.visitante}\nMarcador: __ - __\nGoleadores: ______`).join("\n\n");
}

function copyShareMessage(){
 navigator.clipboard.writeText(sharePreview.textContent);
 alert("Mensaje copiado");
}

function addPlayer(){
 const name=newPlayer.value.trim();
 if(!name)return;
 players.push({nombre:name});
 newPlayer.value="";
 saveSheet("DB",objectsToRows(["nombre"],players));
 renderAll();
}

function addMatch(){
 const date=newDate.value, home=newHome.value.trim(), away=newAway.value.trim();
 if(!date||!home||!away)return alert("Faltan datos");

 const count=matches.filter(m=>m.fecha===date).length+1;
 matches.push({
  id:makeMatchId(date,home,away,count),
  fecha:date,
  fase:newPhase.value,
  hora:newTime.value,
  local:home,
  visitante:away
 });

 saveSheet("Sheet1",objectsToRows(["id","fecha","fase","hora","local","visitante"],matches));
 renderAll();
}

function renderAdmin(){
 adminData.innerHTML=`<h3>Jugadores</h3>${players.map(p=>`<p>${p.nombre}</p>`).join("")}
 <h3>Partidos</h3>${matches.map(m=>`<p><b>${m.fecha}</b> · ${m.local} vs ${m.visitante}<br><span class="small">${m.id}</span></p>`).join("")}`;
}

setInterval(loadCloud,30000);
loadCloud();
</script>
